<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linnéa</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=WindSong&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <script src="./js/script.js" defer></script>
</head>

<body>

    <header>
        <!-- TOP BAR -->
         <nav class="top-bar">
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <a href="index.html" class="logo">Linnéa</a>

            <div class="top-bar-icons">
                 <img src="./images/search.png" alt="search">
                 <img src="./images/profile.png" alt="profile">
                 
                 <a href="cart.html" class="cart-icon">
                     <img src="./images/shopping-bag.png" alt="shopping-bag">
                     <span class="cart-count" style="display:none;">0</span>
                 </a>
            </div>
        </nav>
        
        <!-- MENU -->
        <nav class="main-nav" id="navLinks">
             <ul class="categories">
                 <li><a href="#">Bestsellers</a></li>
                 <li><a href="products.html">Necklaces</a></li>
                 <li><a href="#">Bracelets</a></li>
                 <li><a href="#">Earrings</a></li>
                 <li><a href="#">Rings</a></li>
                 <li><a href="#">Watches</a></li>
             </ul>
       </nav>
    </header>
  
    <main>
        <!-- FIRST IMAGE ON START PAGE -->
        <div class="start-page-image">
           <img src="./images/dua-lipa.png" alt="Start page"> 
        </div>
        
        <h3>New Launches</h3>

        <!-- PRODUCT -->
        <div class="new-launches">
            <a href="product.html" class="shopping">
                <img src="./images/cross-necklace.png" alt="cross-necklace">
                <p class="title">Cross Necklace</p>
                <p class="price">99 €</p>

                 <button class="shop"
                     data-title="Cross Necklace"
                     data-price="99"
                     data-image="./images/cross-necklace.png">
                     Shop Now
                </button>
            </a>
            
            <a href="product.html" class ="shopping">
                 <img src="./images/mid-hoop-silver.png" alt="mid-hoop-silver">
                 <p class="title">Mid Hoop Silver</p>
                 <p class="price">79 €</p>
                 
                 <button class="shop"
                     data-title="Mid Hoop Silver"
                     data-price="79"
                     data-image="./images/mid-hoop-silver.png">
                     Shop Now
                 </button>
            </a>

            <a href="product.html" class ="shopping">
                 <img src="./images/several-bracelets.png" alt="several-bracelets">
                 <p class="title">Several Bracelets</p>
                 <p class="price">59 €</p>

                 <button class="shop"
                     data-title="Several bracelets"
                     data-price="59"
                     data-image="./images/several-bracelets.png">
                     Shop Now
                 </button>
            </a>

            <a href="product.html" class ="shopping">
                 <img src="./images/heart-necklace.png" alt="heart-necklace">
                 <p class="title">Heart Necklace</p>
                 <p class="price">89 €</p>

                 <button class="shop"
                     data-title="Heart Necklace"
                     data-price="89"
                     data-image="./images/heart-necklace.png">
                     Shop Now
                 </button>
            </a>

            <a href="product.html" class ="shopping">
                 <img src="./images/promise-ring.png" alt="promise-ring">
                 <p class="title">Promise Ring</p>
                 <p class="price">49 €</p>

                <button class="shop"
                     data-title="Promise Ring"
                     data-price="49"
                     data-image="./images/promise-ring.png">
                     Shop Now
                </button>
            </a>
        </div>
    
    </main>

 <footer>
        <div class="footer-info">
            <p>About Us</p>
            <p>Contact</p>
            <p>Help</p>
        </div>
        
        <p>&copy; 2026 Linnéa</p>
 </footer>

</body>
</html>
