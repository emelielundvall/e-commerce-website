<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=WindSong&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <script src="./js/script.js" defer></script>
</head>
<body>
    
    <header>
        <nav class="top-bar">
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <a href="index.html" class="logo">Linnéa</a>
            

            <div class="top-bar-icons">
                 <img src="./images/search.png" alt="search">
                 <img src="./images/profile.png" alt="profile">
                 <a href="cart.html" class="cart-icon">
                     <img src="./images/shopping-bag.png" alt="shopping-bag">
                     <span class="cart-count" style="display:none;">0</span>
             </a>
            </div>
        </nav>


        <nav class="main-nav" id="navLinks">
             <ul class="categories">
                 <li><a href="#">Bestsellers</a></li>
                 <li><a href="products.html">Necklaces</a></li>
                 <li><a href="#">Bracelets</a></li>
                 <li><a href="#">Earrings</a></li>
                 <li><a href="#">Rings</a></li>
                 <li><a href="#">Watches</a></li>
             </ul>
       </nav>
    </header>

    
    <main>
        <p class="cart">Your Cart</p>

        <hr class="fixed-line">

        <div class="cart-items-container"></div>

        <div class="proceed-to-payment">
            <p class="summary">Total incl. VAT</p>
            <p class="total-price">0 €</p>
            <button class="payment">Proceed to payment</button>
        </div>
       


    </main>

    <footer>
        <p>&copy; 2026 Linnéa</p>
    </footer>
    
</body>
</html>
